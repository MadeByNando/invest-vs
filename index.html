<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comparateur d'ETF</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar">
        <div class="app-header">
          <h2 class="app-title">Comparateur d'ETF</h2>
        </div>
        <form id="parametersForm">
          <fieldset>
            <legend><strong>Phase d'accumulation</strong></legend>
            <div class="form-group">
              <label for="initialCapital">Capital initial (€) :</label>
              <input
                type="number"
                id="initialCapital"
                value="20000"
                step="any"
                required
              />
            </div>

            <div class="form-group">
              <label for="monthlyDeposit">Versement mensuel (€) :</label>
              <input
                type="number"
                id="monthlyDeposit"
                value="350"
                step="any"
                required
              />
            </div>

            <div class="form-group">
              <label for="accumulationYears">Années d'accumulation :</label>
              <input type="number" id="accumulationYears" value="28" required />
            </div>

            <div class="form-group">
              <label for="annualReturn">Rendement annuel (%) :</label>
              <input
                type="number"
                id="annualReturn"
                value="7"
                step="any"
                required
              />
            </div>
          </fieldset>

          <fieldset>
            <legend><strong>Paramètres ETF</strong></legend>
            <div class="form-group">
              <label for="feeETF1">Frais annuels ETF1 (%) :</label>
              <input
                type="number"
                id="feeETF1"
                value="0.20"
                step="any"
                required
              />
            </div>

            <div class="form-group">
              <label for="feeETF2">Frais annuels ETF2 (%) :</label>
              <input
                type="number"
                id="feeETF2"
                value="0.25"
                step="any"
                required
              />
            </div>
          </fieldset>

          <fieldset>
            <legend><strong>Phase de décumulation</strong></legend>
            <div class="form-group">
              <label for="retirementYears">Années de retraite :</label>
              <input type="number" id="retirementYears" value="30" required />
            </div>

            <div class="form-group">
              <label for="netWithdrawalAnnual">Retrait net annuel désiré (€) :</label>
              <input
                type="number"
                id="netWithdrawalAnnual"
                value="21600"
                required
              />
            </div>

            <div class="form-group">
              <label for="taxETF1">Taxe ETF1 (%) :</label>
              <input
                type="number"
                id="taxETF1"
                value="30"
                step="any"
                required
              />
            </div>

            <div class="form-group">
              <label for="taxETF2">Taxe ETF2 (%) :</label>
              <input
                type="number"
                id="taxETF2"
                value="18"
                step="any"
                required
              />
            </div>
          </fieldset>

          <button type="button" onclick="simulate()">
            <span class="button-icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 512">
                <path d="M384 160c-17.7 0-32-14.3-32-32s14.3-32 32-32H544c17.7 0 32 14.3 32 32V288c0 17.7-14.3 32-32 32s-32-14.3-32-32V205.3L342.6 374.6c-12.5 12.5-32.8 12.5-45.3 0L192 269.3 54.6 406.6c-12.5 12.5-32.8 12.5-45.3 0s-12.5-32.8 0-45.3l160-160c12.5-12.5 32.8-12.5 45.3 0L320 306.7 466.7 160H384z"/>
              </svg>
            </span>
            Calculer
          </button>
        </form>
      </aside>

      <main class="content">
        <div class="app-header">
          <h1>Simulation financière</h1>
        </div>
        
        <div id="results">
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-title">Capital initial</div>
              <div class="stat-value" id="stat-capital">20 000 €</div>
            </div>
            <div class="stat-card">
              <div class="stat-title">Versement mensuel</div>
              <div class="stat-value" id="stat-monthly">350 €</div>
            </div>
            <div class="stat-card">
              <div class="stat-title">Années d'accumulation</div>
              <div class="stat-value" id="stat-years">28</div>
            </div>
          </div>
          
          <div class="empty-results">
            <p>Remplissez le formulaire et cliquez sur "Calculer" pour voir les résultats</p>
          </div>
        </div>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
